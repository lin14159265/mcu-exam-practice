":"真理的（）性是指真理主客观统一的确定性和发展的无限性。","a":"绝对"},{"id":"ZM-065","s":"在矛盾体系中处于支配地位、对事物起决定作用的矛盾是（）。","a":"主要矛盾"},{"id":"ZQ-066","s":"争取（）的实现，不仅是无产阶级彻底解放的标志，也是全人类得到解放的根本要求和体现。","a":"共产主义"}];
const $=id=>document.getElementById(id),KEY='marx_fill_blank_records_simple_v1';let rec=JSON.parse(localStorage.getItem(KEY)||'{}'),pool=[],i=0,state={};function save(){localStorage.setItem(KEY,JSON.stringify(rec))}function R(id){return rec[id]||(rec[id]={try:0,ok:0,no:0,last:'',star:false,master:false,uncertain:false})}function norm(s){return String(s||'').trim().replace(/[\s　，。、；;：:！!？?（）()【】\[\]《》<>“”‘’"'·.]/g,'').toLowerCase()}function stem(s){return s.replace(/（\s*）|\(\s*\)/g,'<span class="blank">空</span>')}function choose(){let s=$('scope').value,a=Q.filter(q=>{let r=R(q.id);if(s==='new')return !r.try;if(s==='wrong')return r.no;if(s==='lastWrong')return r.last==='no';if(s==='star')return r.star;if(s==='unmaster')return !r.master;return true});if(!a.length)a=Q.slice();if($('order').value==='random')a=a.sort(()=>Math.random()-.5);let n=$('size').value==='all'?a.length:+$('size').value;pool=a.slice(0,n);i=0;state={};showQ()}function showQ(){let q=pool[i];$('input').value='';if(!q){$('pos').textContent='未开始';$('q').textContent='点击“开始默认练习”开始刷题。';$('msg').className='box muted';$('msg').textContent='当前没有进行中的练习。';$('prog').textContent='已完成 0 / 0';$('bar').style.width='0%';render();return}let r=R(q.id),st=state[q.id]||'';$('pos').textContent=`${i+1} / ${pool.length} · ${q.id}`;$('q').innerHTML=stem(q.s);$('msg').className='box muted';$('msg').textContent='先回忆，再输入答案。实在想不出就点“不确定 / 查看答案”。';if(st==='ok'){$('msg').className='box ok';$('msg').innerHTML=`正确。答案：<b>${q.a}</b>`}if(st==='no'){$('msg').className='box no';$('msg').innerHTML=`不匹配。正确答案：<b>${q.a}</b>`}if(st==='warn'){$('msg').className='box warn';$('msg').innerHTML=`已查看答案：<b>${q.a}</b>`}$('star').classList.toggle('on',r.star);$('master').classList.toggle('on',r.master);$('show').classList.toggle('on',r.uncertain);render()}function submit(){let q=pool[i];if(!q)return;let r=R(q.id),ok=norm($('input').value)===norm(q.a);r.try++;r.last=ok?'ok':'no';ok?r.ok++:r.no++;state[q.id]=ok?'ok':'no';save();showQ()}function reveal(){let q=pool[i];if(!q)return;let r=R(q.id);r.uncertain=true;state[q.id]='warn';save();showQ()}function move(d){if(!pool.length)return;i=(i+d+pool.length)%pool.length;showQ()}function toggle(k){let q=pool[i];if(!q)return;let r=R(q.id);r[k]=!r[k];save();showQ()}function finish(){let ok=0,no=0,warn=0;pool.forEach(q=>{if(state[q.id]==='ok')ok++;if(state[q.id]==='no')no++;if(state[q.id]==='warn')warn++});let all=pool.length,rate=ok+no?Math.round(ok/(ok+no)*100):0;$('round').className='box';$('round').innerHTML=`本轮 ${all} 题；答对 ${ok}，答错 ${no}，待复习 ${warn}；正确率 ${rate}%。`;tab('settings')}function render(){let done=0,wrong=0,ok=0,tryN=0,m=0;Q.forEach(q=>{let r=R(q.id);if(r.try)done++;if(r.no)wrong++;ok+=r.ok;tryN+=r.try;if(r.master)m++});$('total').textContent=Q.length;$('done').textContent=done;$('wrong').textContent=wrong;$('rate').textContent=tryN?Math.round(ok/tryN*100)+'%':'0%';$('mast').textContent=m;let q=pool[i],r=q?R(q.id):null;$('hist').innerHTML=q?`编号：${q.id}<br>已做：${r.try} 次；正确：${r.ok}；错误：${r.no}<br>收藏：${r.star?'是':'否'}；掌握：${r.master?'是':'否'}；不确定：${r.uncertain?'是':'否'}`:'尚未开始。';let doneRound=pool.filter(q=>state[q.id]).length;$('prog').textContent=`已完成 ${doneRound} / ${pool.length||0}`;$('bar').style.width=pool.length?Math.round(doneRound/pool.length*100)+'%':'0%';$('nav').innerHTML=pool.map((q,n)=>`<button class="cell ${n===i?'now':''} ${state[q.id]||''}" onclick="i=${n};showQ()"><b>${n+1}</b><small>${q.id}</small></button>`).join('')}function tab(v){$('practice').classList.toggle('hidden',v!=='practice');$('settings').classList.toggle('hidden',v!=='settings');$('practiceTab').classList.toggle('active',v==='practice');$('settingsTab').classList.toggle('active',v==='settings');render()}function download(name,text){const b=new Blob([text],{type:'application/json;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}function exportData(){const payload={app:'marx-fill-blank',version:2,exportedAt:new Date().toISOString(),records:rec};download('马原填空题学习数据.json',JSON.stringify(payload,null,2))}function importData(file){if(!file)return;const rd=new FileReader();rd.onload=()=>{try{const p=JSON.parse(rd.result),data=p.records||p;if(!data||typeof data!=='object'||Array.isArray(data))throw new Error('bad');rec=data;save();state={};render();alert('学习数据已导入。')}catch(e){alert('导入失败：请选择本页面导出的 JSON 学习数据文件。')}};rd.readAsText(file,'utf-8')}$('start').onclick=choose;$('start2').onclick=()=>{choose();tab('practice')};$('submit').onclick=submit;$('show').onclick=reveal;$('next').onclick=()=>move(1);$('prev').onclick=()=>move(-1);$('finish').onclick=finish;$('star').onclick=()=>toggle('star');$('master').onclick=()=>toggle('master');$('practiceTab').onclick=()=>tab('practice');$('settingsTab').onclick=()=>tab('settings');$('themeBtn').onclick=()=>{let d=document.documentElement;d.dataset.theme=d.dataset.theme==='dark'?'light':'dark';$('themeBtn').textContent=d.dataset.theme==='dark'?'◐ Lab Light':'◐ GitHub Dark'};$('clear').onclick=()=>{if(confirm('清空所有学习记录？')){rec={};save();render()}};$('exportBtn').onclick=exportData;$('importFile').onchange=e=>importData(e.target.files[0]);$('input').onkeydown=e=>{if(e.key==='Enter')submit()};render();
</script>
